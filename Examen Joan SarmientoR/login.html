<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión - ModaNova</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="web.css">
</head>
<body class="bg-light">
<div class="text-center">
    <img src="Img/12.png" alt="Logo ModaNova" class="login-logo">
  </div>
  <div class="container mt-5">
    <h2 class="text-center mb-4">Iniciar Sesión</h2>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="loginForm" class="bg-white p-4 shadow rounded">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña">
          </div>
          <button type="submit" class="btn btn-dark w-100">Iniciar Sesión</button>
          <div id="loginError" class="text-danger mt-3 d-none">Correo o contraseña incorrectos.</div>
        </form>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
